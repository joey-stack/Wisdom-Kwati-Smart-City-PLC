# BrowserStack Playwright SDK Configuration
# Authentication keys are read automatically from BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY environment variables

projectName: Wisdom Kwati Smart City
buildName: Local Playwright Build

# Enable BrowserStack Local tunnel to allow remote cloud browsers to access local servers
browserstackLocal: true
idleTimeout: 300

platforms:
  - browserName: chrome
    browserVersion: latest
    os: Windows
    osVersion: 11
  - browserName: playwright-webkit
    browserVersion: latest
    os: OS X
    osVersion: Sonoma
  - deviceName: iPhone 15 Pro
    osVersion: 17
    browserName: playwright-webkit
